<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Patient Data | Health Navigator</title>
    <!-- Tailwind CSS Styling Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6 text-slate-200">

    <div class="max-w-xl w-full bg-slate-950 border border-slate-800 rounded-2xl p-8 shadow-2xl space-y-6">
        
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-bold tracking-wide text-white">Ingest Patient Records</h1>
            <p class="text-xs text-slate-400">Upload your target .xlsx or .xls file to populate the 2,000-record matrix</p>
        </div>

        <!-- System Message Alerts (Django Messages) -->
        {% if messages %}
            <div class="space-y-2 text-xs font-mono">
                {% for message in messages %}
                    <div class="p-3 rounded-lg border {% if message.tags == 'success' %}bg-emerald-950/40 border-emerald-500/50 text-emerald-400{% else %}bg-rose-950/40 border-rose-500/50 text-rose-400{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Core Upload Form Layout -->
        <form action="" method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <!-- 📁 The File Drop Target Box -->
            <label for="excel_file" class="group relative block w-full border-2 border-dashed border-slate-800 hover:border-indigo-500/60 rounded-xl p-8 text-center cursor-pointer transition-all bg-slate-900/40 hover:bg-slate-900/80">
                
                <!-- 🛡️ CRITICAL FIX: The actual file input element is fully overlaying the box -->
                <input type="file" name="excel_file" id="excel_file" accept=".xlsx, .xls" required
                       class="absolute inset-0 opacity-0 cursor-pointer z-10"
                       onchange="updateFileName(this)">

                <div class="space-y-3 pointer-events-none">
                    <!-- Icon -->
                    <div class="text-slate-500 group-hover:text-indigo-400 transition-colors flex justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <!-- Indicator Text -->
                    <div id="file-label-text" class="text-sm font-medium text-slate-300 group-hover:text-white transition-colors">
                        Click here or drag to select your Excel Spreadsheet
                    </div>
                    <div class="text-xs text-slate-500">
                        Supports standard .xlsx and .xls formats
                    </div>
                </div>
            </label>

            <!-- Submission Trigger Button Tray -->
            <div class="flex items-center space-x-4">
                <a href="/dashboard/" class="flex-1 text-center bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 font-semibold text-sm px-4 py-3 rounded-xl transition-colors">
                    Back to Console
                </a>
                <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm px-4 py-3 rounded-xl transition-all shadow-md hover:scale-[1.01] active:scale-95">
                    Process & Load Records
                </button>
            </div>
        </form>
    </div>

    <!-- ⚙️ JavaScript UI Interface String Interceptor Name Sync -->
    <script>
        function updateFileName(input) {
            const labelText = document.getElementById('file-label-text');
            if (input.files && input.files.length > 0) {
                const name = input.files[0].name;
                // Swap instruction label text to explicitly highlight selected file name!
                labelText.innerHTML = `📄 Selected File: <span class="text-indigo-400 font-mono text-xs font-bold break-all">${name}</span>`;
            } else {
                labelText.innerText = "Click here or drag to select your Excel Spreadsheet";
            }
        }
    </script>
</body>
</html>
