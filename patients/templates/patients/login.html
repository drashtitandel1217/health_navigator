<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Authentication Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-card: #151b26;
            --border-color: #242f41;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #0284c7;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-muted);
            margin: 0 0 2rem 0;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input {
            padding: 0.75rem 1rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .submit-btn {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s ease;
        }

        .submit-btn:hover {
            background-color: #0369a1;
        }

        .alert {
            background-color: #7f1d1d;
            border: 1px solid #f87171;
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            list-style: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Clinical Staff Access</h2>
        <p class="subtitle">Enter your institutional authentication credentials below.</p>

        {% if messages %}
        <div class="alert">
            {% for message in messages %}
            {{ message }}
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_data %}
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username Reference</label>
                <input type="text" name="username" autofocus required id="id_username" placeholder="e.g., dr_tandel">
            </div>
            <div class="form-group">
                <label for="id_password">Security Keyphrase</label>
                <input type="password" name="password" required id="id_password" placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn">Authorize Session</button>
        </form>
    </div>

</body>

</html>
